# ------------------------------------------------------------------------------
# ------------------------------- Basic Settings -------------------------------
# ------------------------------------------------------------------------------
# Full color
set -g default-terminal "screen-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

# Mouse
set -g mouse on
bind-key -T edit-mode-vi WheelUpPane send-keys -X scroll-up
bind-key -T edit-mode-vi WheelDownPane send-keys -X scroll-down


# -----------------------------------------------------------------------------
# ---------------------------- Key Bindings -----------------------------------
# -----------------------------------------------------------------------------
set -g prefix C-s

# Reload
bind q source-file ~/.tmux.conf \; display "Config reloaded"

# Session selector
bind s choose-tree -Z
bind C-s choose-tree -Z

# Open / Close
bind o new-window -c "#{pane_current_path}"
bind C-o new-window -c "#{pane_current_path}"
bind -r c kill-pane
bind -r C-c kill-pane

# Split window into pane
bind v split-window -v -c "#{pane_current_path}"
bind C-v split-window -v -c "#{pane_current_path}"
bind i split-window -h -c "#{pane_current_path}"
bind C-i split-window -h -c "#{pane_current_path}"

# Focus / Zoom pane
bind -r C-n previous-window
bind -r C-p next-window
bind f resize-pane -Z
bind C-f resize-pane -Z

# Move window (reorder in window list)
bind -r P swap-window -t +1\; next-window
bind -r N swap-window -t -1\; previous-window

# Move pane
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind C-h select-pane -L
bind C-j select-pane -D
bind C-k select-pane -U
bind C-l select-pane -R

# Resize pane
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


# ------------------------------------------------------------------------------
# ----------------------------- Color Palette ---------------------------------
# ------------------------------------------------------------------------------
# Harmonised with bash PS1 (colour110 / colour239) and nvim lightline
#   ACCENT  = colour110  (light blue / user segment)
#   DARK    = colour239  (dark grey / dir segment)
#   BG      = colour0    (terminal black)
#   FG      = colour252  (bright grey text)
#   GRAY    = colour245  (mid grey dim text)
#   CYAN    = colour6    (cyan / active window)

# ------------------------------------------------------------------------------
# ----------------------------- Status Bar ------------------------------------
# ------------------------------------------------------------------------------
set -g status-position top
set -g status-style bg=colour239,fg=colour252
set -g status-justify left

# Left: empty
set -g status-left " "

# Right: session -> host -> time
set -g status-right "#[bg=colour239,fg=colour110]#[bg=colour110,fg=colour16] #S #[bg=colour110,fg=colour239]#[bg=colour239,fg=colour7] #{host} #[bg=colour239,fg=colour252]#[bg=colour252,fg=colour16] %H:%M "

# Inactive window
setw -g window-status-format "#[bg=colour239,fg=colour245] #I:#W "

# Active window
setw -g window-status-current-format "#[bg=colour110,fg=colour239] #[bg=colour110,fg=colour16]#I:#W #[bg=colour239,fg=colour110]"

# Empty divider
setw -g window-status-separator ""

# -----------------------------------------------------------------------------
# ----------------------------- Pane Borders ----------------------------------
# -----------------------------------------------------------------------------
set -g pane-border-style fg=colour239
set -g pane-active-border-style "fg=colour110,bold"
set -g pane-border-lines heavy
set -g pane-border-status top
setw -g pane-border-format ""

# Hide borders if only one pane in the window
set-hook -g window-layout-changed 'if -F "#{==:#{window_panes},1}" "set -w pane-border-status off" "set -w pane-border-status top"'
set-hook -g window-linked 'if -F "#{==:#{window_panes},1}" "set -w pane-border-status off" "set -w pane-border-status top"'

# -----------------------------------------------------------------------------
# ----------------------------- Message Styles --------------------------------
# -----------------------------------------------------------------------------
set -g message-style bg=colour110,fg=colour16
set -g mode-style bg=colour239,fg=colour252

