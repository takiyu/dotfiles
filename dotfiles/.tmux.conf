# Full color
set -g default-terminal "screen-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

# Mouse
set -g mouse on
bind-key -T edit-mode-vi WheelUpPane send-keys -X scroll-up
bind-key -T edit-mode-vi WheelDownPane send-keys -X scroll-down

# Prefix Key
set -g prefix C-s

# Session selector
bind s choose-tree -Z
bind C-s choose-tree -Z

# Open / Close
bind o new-window -c "#{pane_current_path}"
bind C-o new-window -c "#{pane_current_path}"
bind -r c kill-pane
bind -r C-c kill-pane
# Split window into pane
bind v split-window -v -c "#{pane_current_path}"
bind C-v split-window -v -c "#{pane_current_path}"
bind i split-window -h -c "#{pane_current_path}"
bind C-i split-window -h -c "#{pane_current_path}"

# Move window
bind -r C-n next-window
bind -r C-p previous-window

# Move pane
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind C-h select-pane -L
bind C-j select-pane -D
bind C-k select-pane -U
bind C-l select-pane -R
# Resize pane
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
